name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: verify modules
        run: go mod verify
      - name: lint (incl. depguard allow-list)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend
      - name: vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: install (locked)
        run: npm ci
      - name: vulnerability scan
        run: npm audit --audit-level=high
      - name: build
        run: npm run build
